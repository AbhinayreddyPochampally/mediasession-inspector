<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MediaSession Inspector</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b7280;
        --border: #e5e7eb;
        --card: #f9fafb;
        --on: #16a34a;
        --off: #9ca3af;
        --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e1e;
          --fg: #e6e6e6;
          --muted: #9aa0a6;
          --border: #3c3c3c;
          --card: #252526;
          --on: #4ade80;
          --off: #6b7280;
          --accent: #60a5fa;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--bg);
      }
      header h1 { font-size: 13px; margin: 0; font-weight: 600; }
      header .status { color: var(--muted); font-size: 11px; }
      .wrap { padding: 12px; display: grid; gap: 12px; }
      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        padding: 10px 12px;
      }
      .card h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 8px;
      }
      .kv { display: grid; grid-template-columns: 92px 1fr; gap: 2px 10px; }
      .kv dt { color: var(--muted); }
      .kv dd { margin: 0; word-break: break-word; }
      .pill {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 11px;
        background: rgba(37, 99, 235, 0.12);
        color: var(--accent);
      }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 5px 6px; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-weight: 500; }
      .dot { font-size: 14px; line-height: 1; }
      .dot.on { color: var(--on); }
      .dot.off { color: var(--off); }
      .action-name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      button {
        font: inherit;
        padding: 3px 10px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .empty { color: var(--muted); font-style: italic; }
      .art { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
      .art img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
      #log {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: var(--muted);
        max-height: 120px;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>MediaSession Inspector</h1>
      <span class="status" id="status">waiting for page activity…</span>
    </header>
    <div class="wrap">
      <section class="card">
        <h2>Playback</h2>
        <dl class="kv">
          <dt>State</dt>
          <dd><span class="pill" id="playbackState">none</span></dd>
        </dl>
      </section>

      <section class="card">
        <h2>Metadata</h2>
        <div id="metadata"><span class="empty">No metadata set.</span></div>
      </section>

      <section class="card">
        <h2>Position state</h2>
        <div id="positionState"><span class="empty">setPositionState() not called.</span></div>
      </section>

      <section class="card">
        <h2>Action handlers</h2>
        <table>
          <thead>
            <tr><th style="width:24px"></th><th>Action</th><th style="width:90px"></th></tr>
          </thead>
          <tbody id="actions"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>Activity</h2>
        <div id="log"></div>
      </section>
    </div>
    <script src="panel.js"></script>
  </body>
</html>
